    <title>The Quantum Split — Composed Rooms</title>
    <link rel="icon" href="data:," />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;

        position: fixed;
        inset: 0;
      }

        display: block;

        position: fixed;

        background: rgba(8, 12, 18, 0.72);
        border: 1px solid #223042;
        border-radius: 6px;
        pointer-events: none;
      }
      #hud b {
        color: #d6ecff;
      }
    </style>

  <body>
    <div id="app"></div>
    <div id="hud">
      <span id="devcontrols" style="display: none">

      <span id="hint">Click props to play · drag to orbit, scroll to zoom</span><br />
      <span id="room-name"></span><br />
      <span id="objective" style="color: #ffd98a"></span><br />
      <span id="toast" style="color: #d6ecff"></span>
