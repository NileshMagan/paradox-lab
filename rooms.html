<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Paradox Lab — Rooms</title>
    <link rel="icon" href="data:," />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-user-select: none;
        user-select: none;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        touch-action: none;
      }
      /* On-screen movement pad (touch / click-hold). */
      #forward {
        position: fixed;
        right: 22px;
        bottom: 22px;
        width: 74px;
        height: 74px;
        z-index: 34;
        border-radius: 50%;
        border: 1px solid rgba(150, 190, 230, 0.4);
        background: rgba(14, 22, 34, 0.7);
        color: #cfe0f2;
        font-size: 26px;
        cursor: pointer;
        touch-action: none;
        transition: background 0.12s, transform 0.1s;
      }
      #forward:active {
        background: rgba(46, 120, 200, 0.55);
        transform: scale(0.94);
      }
      /* Hidden mirror of game state for automated tests; never shown. */
      #hud {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <button id="forward" aria-label="Move forward" title="Hold to move forward">▲</button>
    <div id="hud">
      <span id="devcontrols"></span>
      <span id="room-name"></span>
      <span id="objective"></span>
      <span id="toast"></span>
    </div>
    <script type="module" src="/src/scenery/rooms/main.ts"></script>
  </body>
</html>
