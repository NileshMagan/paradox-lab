<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Quantum Split</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="fonts/fonts.css" />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        display: block;
        touch-action: none;
      }
      #forward {
        position: fixed;
        right: 22px;
        bottom: 22px;
        width: 74px;
        height: 74px;
        z-index: 34;
        border-radius: 50%;
        border: 1px solid rgba(150, 190, 230, 0.4);
        background: rgba(14, 22, 34, 0.7);
        color: #cfe0f2;
        font-size: 26px;
        cursor: pointer;
        touch-action: none;
      }
      #forward:active {
        background: rgba(46, 120, 200, 0.55);
        transform: scale(0.94);
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <button id="forward" aria-label="Move forward" title="Hold to move forward">▲</button>
    <!-- Game bootstrap (unchanged) + lobby chrome + multiplayer, layered on top. -->
    <script type="module" src="/src/main.ts"></script>
    <script type="module" src="/src/lobby/overlayBoot.ts"></script>
    <!-- Multiplayer is inert unless launched with ?mp=1 (needs `npm run server`). -->
    <script type="module" src="/src/net/netBoot.ts"></script>
  </body>
</html>
